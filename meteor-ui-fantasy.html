<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운석 강화 UI · 다크 판타지</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gothic+A1:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0a1124;          /* 배경 위 */
    --bg-2:#04060f;          /* 배경 아래 */
    --gold-1:#fff6d0;        /* 금 하이라이트 */
    --gold-2:#e9c45a;        /* 금 본색 */
    --gold-3:#a87b22;        /* 금 음영 */
    --gold-4:#5e4111;        /* 금 진한 음영 */
    --gem-1:#3a6fd8;         /* 사파이어 밝은 */
    --gem-2:#1b3a86;         /* 사파이어 */
    --gem-3:#0c1d4d;         /* 사파이어 어두운 */
    --panel-1:#16223f;
    --panel-2:#0a1126;
    --text:#f2ead2;
    --text-dim:#9fb0d4;
    --gold-text:#ffd86b;
    --blue-text:#7ea7ff;
    --chamfer:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Gothic A1',sans-serif;background:#000;
    display:flex;justify-content:center;padding:24px;min-height:100vh;
  }
  .phone{
    width:430px;position:relative;overflow:hidden;border-radius:30px;
    padding:22px 18px 26px;
    background:
      radial-gradient(90% 50% at 50% 38%, rgba(40,70,150,.30), transparent 60%),
      radial-gradient(70% 40% at 50% 95%, rgba(180,140,50,.10), transparent 60%),
      linear-gradient(180deg,var(--bg-1),var(--bg-2));
    box-shadow:0 30px 80px rgba(0,0,0,.7);
    border:3px solid;
    border-image:linear-gradient(160deg,var(--gold-1),var(--gold-3) 50%,var(--gold-4)) 1;
  }
  .stars{position:absolute;inset:0;pointer-events:none;opacity:.9;
    background-image:
      radial-gradient(1.5px 1.5px at 18% 14%, #fff9, transparent),
      radial-gradient(1px 1px at 62% 20%, #ffd98a99, transparent),
      radial-gradient(1.5px 1.5px at 80% 30%, #fff7, transparent),
      radial-gradient(1px 1px at 30% 46%, #ffe6a877, transparent),
      radial-gradient(1.5px 1.5px at 88% 60%, #fff6, transparent),
      radial-gradient(1px 1px at 12% 70%, #fff7, transparent),
      radial-gradient(1.5px 1.5px at 50% 88%, #ffd98a66, transparent);
  }

  /* === 금테 프레임 (깎인 모서리) === */
  .frame{
    --bw:2.5px;
    position:relative;z-index:2;
    clip-path:polygon(var(--chamfer) 0, calc(100% - var(--chamfer)) 0, 100% var(--chamfer),
      100% calc(100% - var(--chamfer)), calc(100% - var(--chamfer)) 100%, var(--chamfer) 100%,
      0 calc(100% - var(--chamfer)), 0 var(--chamfer));
    background:linear-gradient(150deg,var(--gold-1),var(--gold-2) 35%,var(--gold-3) 65%,var(--gold-4));
    padding:var(--bw);
  }
  .frame > .inner{
    clip-path:inherit;
    background:linear-gradient(180deg,var(--panel-1),var(--panel-2));
    width:100%;height:100%;
  }

  /* 보석(사파이어) 채움 패널 */
  .gem .inner{
    background:
      radial-gradient(60% 80% at 30% 20%, rgba(150,190,255,.55), transparent 55%),
      repeating-linear-gradient(35deg, rgba(255,255,255,.06) 0 6px, transparent 6px 16px),
      repeating-linear-gradient(-30deg, rgba(0,0,0,.18) 0 8px, transparent 8px 22px),
      linear-gradient(180deg,var(--gem-1),var(--gem-2) 55%,var(--gem-3));
  }

  /* === 상단 내비 === */
  .nav{display:flex;gap:9px;position:relative;z-index:2}
  .nav .frame{flex:1}
  .nav .inner{display:flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 6px;min-height:58px;text-align:center}
  .nav .ico{font-size:18px;filter:drop-shadow(0 0 4px #ffd98a88)}
  .nav .label{font-family:'Do Hyeon';font-size:13.5px;color:var(--text);line-height:1.2}
  .nav .frame.active{
    background:linear-gradient(150deg,#fff6d0,#ffdf7a 40%,#c79a2e 70%,#7a5614);
  }
  .nav .frame.active .inner{
    background:
      radial-gradient(70% 90% at 50% 0%, rgba(120,90,30,.5), transparent 60%),
      linear-gradient(180deg,#13203c,#0a1330);
    box-shadow:inset 0 0 18px rgba(255,200,90,.35);
  }
  .nav .frame.active .label{color:#ffe9a8}
  .nav .frame.active .ico{filter:drop-shadow(0 0 7px #ffd98a)}

  /* === 타이틀 패널 === */
  .title{margin-top:14px}
  .title .inner{padding:18px 16px 16px;text-align:center;
    background:
      radial-gradient(80% 120% at 50% 0%, rgba(40,80,170,.5), transparent 60%),
      linear-gradient(180deg,#152murk,#0b1530);
    background:
      radial-gradient(80% 120% at 50% 0%, rgba(40,80,170,.5), transparent 60%),
      linear-gradient(180deg,#13213f,#0a1430);
  }
  .gold-text{
    font-family:'Black Han Sans';
    background:linear-gradient(180deg,#fff6cf,#ffd86b 45%,#d39b2c);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 6px rgba(0,0,0,.5);
    filter:drop-shadow(0 0 6px rgba(255,200,90,.35));
  }
  .title h1{font-size:30px;letter-spacing:1px}
  .title .meta{font-family:'Do Hyeon';font-size:14px;color:var(--text-dim);margin-top:6px}
  .pill{
    display:inline-block;margin-top:12px;position:relative;
  }
  .pill .frame{--chamfer:10px}
  .pill .inner{padding:7px 26px}
  .pill span{font-family:'Do Hyeon';font-size:15px;color:#ffe9a8}

  /* === 메테오 === */
  .stage{position:relative;z-index:2;height:280px;display:flex;
    align-items:center;justify-content:center;margin:6px 0}
  .meteor{font-size:170px;line-height:1;
    filter:drop-shadow(0 0 26px rgba(255,210,150,.5)) saturate(.7) brightness(1.05);
    animation:float 5s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(-10px)}50%{transform:translateY(10px)}}
  .halo{position:absolute;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(120,150,220,.30), transparent 65%);filter:blur(8px)}
  .debris{position:absolute;font-size:14px;opacity:.5;color:#caa46a}
  .d1{top:20%;left:14%}.d2{top:70%;left:18%}.d3{top:30%;right:12%}.d4{bottom:18%;right:20%}

  /* === 강화 바 (긴 사파이어) === */
  .enhance-bar{margin-top:8px}
  .enhance-bar .inner{padding:16px;text-align:center;position:relative}
  .enhance-bar h2{font-family:'Black Han Sans';font-size:26px;letter-spacing:6px;
    color:#fff;text-shadow:0 2px 4px rgba(0,30,90,.8),0 0 10px rgba(150,190,255,.5)}

  /* === 강화 정보 패널 === */
  .info{margin-top:12px}
  .info .inner{display:flex;align-items:center;gap:16px;padding:16px 18px}
  .info .left{text-align:center;flex-shrink:0;width:118px}
  .info .left .cap{font-family:'Do Hyeon';font-size:16px;color:#ffe1b0;line-height:1.4}
  .info .gemslot{font-size:46px;margin-top:6px;filter:drop-shadow(0 0 10px rgba(255,140,60,.7))}
  .info .right{flex:1;font-family:'Gothic A1';font-weight:700}
  .info .right div{font-size:17px;line-height:2.1;color:var(--text)}
  .info .rate{color:var(--gold-text);font-family:'Black Han Sans'}
  .info .state{color:var(--blue-text)}

  /* === 재료 바 === */
  .mats{display:flex;gap:9px;margin-top:14px;position:relative;z-index:2}
  .mats .frame{flex:1;--chamfer:10px}
  .mats .inner{padding:10px 4px 8px;text-align:center;
    background:linear-gradient(180deg,#13203c,#080e22)}
  .mats .ico{font-size:30px;filter:drop-shadow(0 0 7px rgba(255,200,120,.6))}
  .mats .nm{font-family:'Do Hyeon';font-size:11px;color:var(--text);margin-top:5px;line-height:1.2}
  .mats .qty{font-family:'Gothic A1';font-weight:800;font-size:13px;color:var(--blue-text);margin-top:2px}
</style>
</head>
<body>
  <div class="phone">
    <div class="stars"></div>

    <!-- 내비 -->
    <div class="nav">
      <div class="frame active"><div class="inner">
        <span class="ico">⛏️</span><span class="label">별 채굴하기<br>오늘 완료</span>
      </div></div>
      <div class="frame"><div class="inner">
        <span class="ico">💎</span><span class="label">재료<br>교환</span>
      </div></div>
      <div class="frame"><div class="inner">
        <span class="ico">📖</span><span class="label">도감</span>
      </div></div>
      <div class="frame"><div class="inner">
        <span class="ico">⚙️</span><span class="label">설정</span>
      </div></div>
    </div>

    <!-- 타이틀 -->
    <div class="frame title"><div class="inner">
      <h1 class="gold-text">4강 거대 하트 운석</h1>
      <div class="meta">최고 기록 4강</div>
      <div class="pill"><div class="frame"><div class="inner"><span>정보 보기</span></div></div></div>
    </div></div>

    <!-- 메테오 -->
    <div class="stage">
      <div class="halo"></div>
      <span class="debris d1">◆</span><span class="debris d2">◇</span>
      <span class="debris d3">◆</span><span class="debris d4">◇</span>
      <div class="meteor">🤍</div>
    </div>

    <!-- 강화 바 -->
    <div class="frame gem enhance-bar"><div class="inner">
      <h2>강 화</h2>
    </div></div>

    <!-- 강화 정보 -->
    <div class="frame info"><div class="inner">
      <div class="left">
        <div class="cap">선택 재료<br>운석 파편</div>
        <div class="gemslot">🔥</div>
      </div>
      <div class="right">
        <div>성공확률 : <span class="rate">50%</span></div>
        <div>실패시 30% 확률로 소멸</div>
        <div>상태 : <span class="state">안정</span></div>
      </div>
    </div></div>

    <!-- 재료 -->
    <div class="mats">
      <div class="frame"><div class="inner"><div class="ico">🪨</div><div class="nm">운석 파편</div><div class="qty">x999</div></div></div>
      <div class="frame"><div class="inner"><div class="ico">⭐</div><div class="nm">별의 조각</div><div class="qty">x999</div></div></div>
      <div class="frame"><div class="inner"><div class="ico">🌟</div><div class="nm">온전한 별핵</div><div class="qty">x999</div></div></div>
      <div class="frame"><div class="inner"><div class="ico">🔮</div><div class="nm">특이성 조각</div><div class="qty">x999</div></div></div>
      <div class="frame"><div class="inner"><div class="ico">✴️</div><div class="nm">원초의 별</div><div class="qty">x999</div></div></div>
    </div>
  </div>
</body>
</html>
